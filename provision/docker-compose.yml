# tetrapod services. tags are pinned on purpose (no watchtower; update deliberately).
# public internet can't reach any of this: the SG only admits tailscale.
services:
  factorio:
    image: factoriotools/factorio:2.0.76 # arm64 via box64; megabase => resize to amd64
    restart: unless-stopped
    ports:
      - "34197:34197/udp" # tailnet-reachable at tetrapod:34197
      # rcon: tailnet-reachable (SG blocks internet) — kuma tcp-checks this,
      # since unlisted factorio servers can't answer gamedig queries
      - "27015:27015"
    volumes:
      - /opt/tetrapod/factorio:/factorio
    environment:
      LOAD_LATEST_SAVE: "true"
      GENERATE_NEW_SAVE: "true"
      SAVE_NAME: tetrapod
    mem_limit: 4g

  kuma-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # tailnet dns so "lighthouse" resolves inside the container
    dns:
      - 100.100.100.100
    ports:
      - "127.0.0.1:3002:80"
    volumes:
      - ./nginx/kuma-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 64m

  searxng:
    image: searxng/searxng:2026.7.19-6da6eee26
    restart: unless-stopped
    # 0.0.0.0 is tailnet-reachable only (SG admits nothing else) — same
    # pattern as factorio rcon. agents hit http://tetrapod:8888/search?format=json
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - /opt/tetrapod/searxng:/var/cache/searxng
    environment:
      SEARXNG_BASE_URL: http://tetrapod:8888/
    env_file:
      - /opt/tetrapod/searxng.env # SEARXNG_SECRET, generated by bootstrap
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]
    mem_limit: 512m

  code-server:
    image: codercom/code-server:latest # TODO: pin to the digest of the first pull
    restart: unless-stopped
    # tailnet-gated via `tailscale serve --bg 8443`, so no password layer
    command: ["--auth", "none", "--bind-addr", "0.0.0.0:8080"]
    ports:
      - "127.0.0.1:8443:8080"
    volumes:
      - /home/tetraslam:/home/coder/tetrapod # browse the real home dir
    user: "1000:1000"
    mem_limit: 2g
