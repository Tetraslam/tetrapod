# tetrapod services. tags are pinned on purpose (no watchtower; update deliberately).
# public internet can't reach any of this: the SG only admits tailscale.
services:
  factorio:
    image: factoriotools/factorio:2.0.76 # arm64 via box64; megabase => resize to amd64
    restart: unless-stopped
    ports:
      - "34197:34197/udp" # tailnet-reachable at tetrapod:34197
      # rcon: tailnet-reachable (SG blocks internet) — kuma tcp-checks this,
      # since unlisted factorio servers can't answer gamedig queries
      - "27015:27015"
    volumes:
      - /opt/tetrapod/factorio:/factorio
    environment:
      LOAD_LATEST_SAVE: "true"
      GENERATE_NEW_SAVE: "true"
      SAVE_NAME: tetrapod
    mem_limit: 4g

  kuma-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # tailnet dns so "lighthouse" resolves inside the container
    dns:
      - 100.100.100.100
    ports:
      - "127.0.0.1:3002:80"
    volumes:
      - ./nginx/kuma-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 64m

  searxng:
    image: searxng/searxng:2026.7.19-6da6eee26
    restart: unless-stopped
    # 0.0.0.0 is tailnet-reachable only (SG admits nothing else) — same
    # pattern as factorio rcon. agents hit http://tetrapod:8888/search?format=json
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - /opt/tetrapod/searxng:/var/cache/searxng
    environment:
      SEARXNG_BASE_URL: http://tetrapod:8888/
    env_file:
      - /opt/tetrapod/searxng.env # SEARXNG_SECRET, generated by bootstrap
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]
    mem_limit: 512m

  steel:
    # heavy fallback when lightpanda's engine trips on a js-heavy page.
    # only publishes :latest, so pinned by digest (update deliberately).
    image: ghcr.io/steel-dev/steel-browser-api@sha256:a58dd308875116fd5828c148d02c887075a2fd9dc3216eeeede64dce1277b23b
    restart: unless-stopped
    # api + CDP: ws://tetrapod:3003 (sessions api on http://tetrapod:3003)
    ports:
      - "3003:3000"
    environment:
      CHROME_HEADLESS: "true"
    volumes:
      - /opt/tetrapod/steel/.cache:/app/.cache
    mem_limit: 3g

  # ------------------------------------------------------------ media stack
  # library + downloads live on the 1TB st1 volume (/srv/media). everything
  # tailnet-only via the SG. flow: prowlarr feeds indexers to sonarr/radarr,
  # they grab via qbittorrent into downloads/, import into library/, jellyfin
  # serves it. pinchflat archives youtube straight into library/youtube.

  jellyfin:
    image: jellyfin/jellyfin:2026072008
    restart: unless-stopped
    ports:
      - "8096:8096" # http://tetrapod:8096
    volumes:
      - /opt/tetrapod/jellyfin/config:/config
      - /opt/tetrapod/jellyfin/cache:/cache
      - /srv/media/library:/media:ro
    user: "1000:1000"
    mem_limit: 3g

  qbittorrent:
    image: linuxserver/qbittorrent:5.2.3
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Los_Angeles
      WEBUI_PORT: "8081"
    ports:
      - "8081:8081"       # webui: http://tetrapod:8081
      - "6881:6881"       # peers can't reach through the SG; outbound-only is fine
      - "6881:6881/udp"
    volumes:
      - /opt/tetrapod/qbittorrent:/config
      - /srv/media/downloads:/downloads
    mem_limit: 1g

  prowlarr:
    image: linuxserver/prowlarr:2.4.0
    restart: unless-stopped
    environment: { PUID: "1000", PGID: "1000", TZ: America/Los_Angeles }
    ports:
      - "9696:9696"
    volumes:
      - /opt/tetrapod/prowlarr:/config
    mem_limit: 512m

  sonarr:
    image: linuxserver/sonarr:4.0.19
    restart: unless-stopped
    environment: { PUID: "1000", PGID: "1000", TZ: America/Los_Angeles }
    ports:
      - "8989:8989"
    volumes:
      - /opt/tetrapod/sonarr:/config
      - /srv/media:/srv/media # sees downloads/ and library/ at the same paths
    mem_limit: 1g

  radarr:
    image: linuxserver/radarr:6.3.0
    restart: unless-stopped
    environment: { PUID: "1000", PGID: "1000", TZ: America/Los_Angeles }
    ports:
      - "7878:7878"
    volumes:
      - /opt/tetrapod/radarr:/config
      - /srv/media:/srv/media
    mem_limit: 1g

  pinchflat:
    image: ghcr.io/kieraneglin/pinchflat:v2025.9.26
    restart: unless-stopped
    environment:
      TZ: America/Los_Angeles
    ports:
      - "8945:8945"
    volumes:
      - /opt/tetrapod/pinchflat:/config
      - /srv/media/library/youtube:/downloads
    user: "1000:1000"
    mem_limit: 1g

  code-server:
    image: codercom/code-server:latest # TODO: pin to the digest of the first pull
    restart: unless-stopped
    # tailnet-gated via `tailscale serve --bg 8443`, so no password layer
    command: ["--auth", "none", "--bind-addr", "0.0.0.0:8080"]
    ports:
      - "127.0.0.1:8443:8080"
    volumes:
      - /home/tetraslam:/home/coder/tetrapod # browse the real home dir
    user: "1000:1000"
    mem_limit: 2g
