# same-origin proxy for uptime-kuma's status-page API (kuma sends no CORS
# headers, so the wiki dashboard can't fetch lighthouse cross-origin).
# tailscale serve mounts this at /kuma-api on the tetrapod hostname.
server {
  listen 80;
  resolver 100.100.100.100;

  # tailscale serve forwards the full original path, so strip the mount prefix
  location /kuma-api/ {
    proxy_pass https://lighthouse.tailc27667.ts.net/;
    proxy_ssl_server_name on;
    proxy_set_header Host lighthouse.tailc27667.ts.net;
  }

  # in case serve ever strips the prefix instead
  location / {
    proxy_pass https://lighthouse.tailc27667.ts.net;
    proxy_ssl_server_name on;
    proxy_set_header Host lighthouse.tailc27667.ts.net;
  }
}
