# routes the public share funnel port (:10000) to zipline or shlink.
# funnel clobbers x-forwarded-host, so routing is by path prefix: the vercel
# host-rewrites send i.* traffic to /zip/... and link.* to /lnk/..., and the
# trailing slash on proxy_pass strips the prefix before the apps see it.
server {
  listen 80;
  client_max_body_size 512m; # zipline uploads

  location /zip/ {
    proxy_pass http://zipline:3000/;
    proxy_set_header Host i.tetraslam.world;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host i.tetraslam.world;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /lnk/ {
    proxy_pass http://shlink:8080/;
    proxy_set_header Host link.tetraslam.world;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host link.tetraslam.world;
  }

  location / {
    return 404;
  }
}
