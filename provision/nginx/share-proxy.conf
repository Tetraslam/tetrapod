# routes funnel traffic (one public port) to zipline or shlink by original
# host — vercel's external rewrites carry it in x-forwarded-host.
map $http_x_forwarded_host $share_upstream {
  "~^i\.tetraslam\.(world|com)$" http://zipline:3000;
  "~^link\.tetraslam\.(world|com)$" http://shlink:8080;
  default "";
}

server {
  listen 80;
  client_max_body_size 512m; # zipline uploads

  location / {
    if ($share_upstream = "") { return 404; }
    proxy_pass $share_upstream;
    proxy_set_header Host $http_x_forwarded_host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
